# Render Blueprint — AccessMap PH API
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Or create a Web Service manually with root directory `server`.

services:
  - type: web
    name: accessmapph-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Do NOT set PORT here — Render injects it automatically at deploy time.
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
